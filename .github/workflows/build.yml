name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:
    # 允许手动触发构建

jobs:
  # ── macOS 构建 ──
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build macOS app
        run: pyinstaller NewsCollector.spec

      - name: Package as zip (for direct download)
        run: |
          cd dist
          zip -r NewsCollector-macOS.zip NewsCollector.app

      - uses: actions/upload-artifact@v4
        with:
          name: NewsCollector-macOS
          path: dist/NewsCollector-macOS.zip

  # ── Windows 构建 ──
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Windows exe
        run: pyinstaller NewsCollector.spec

      - name: Package as zip
        run: Compress-Archive -Path dist/NewsCollector.exe -DestinationPath dist/NewsCollector-Windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: NewsCollector-Windows
          path: dist/NewsCollector-Windows.zip
