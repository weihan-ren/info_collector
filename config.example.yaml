llm:
  api_key: ${LLM_API_KEY}
  base_url: https://api.deepseek.com
  model: deepseek-v4-flash
  temperature: 0.7
  analysis_prompt: "你是一个专业的AI产业新闻分析师，请根据以下新闻列表，提取和整理AI全产业链相关的新闻。\n\n## 关注范围（按产业链顺序）\n\
    1. **上游矿产与原材料**：锂、钴、稀土、硅材料、高纯化学品等\n2. **半导体与芯片**：AI芯片（GPU/TPU/NPU）、CPU、存储芯片（HBM/DRAM/NAND）、光模块/光芯片、先进封装、EDA/IP、制造设备\n\
    3. **硬件与基础设施**：服务器、数据中心、液冷散热、光通信、网络设备、电力配套\n4. **AI平台与模型**：大模型训练/推理、开源模型、多模态、Agent框架、MLOps\n\
    5. **AI应用与产业化**：各行业AI落地（金融、医疗、制造、自动驾驶等）、大厂AI战略布局、AI Agent产品、企业级AI工具\n6. **政策与监管**：各国AI政策、出口管制、补贴扶持、数据安全法规、伦理规范\n\
    7. **投融资与市场**：AI相关融资、IPO、并购、市值变动、行业趋势分析\n\n## 要求\n1. 优先选取AI产业链相关的新闻，无关新闻（如纯体育、娱乐、非科技类社会新闻）可直接忽略\n\
    2. 按上述产业链分类组织，如果某个分类没有相关新闻则跳过\n3. 每条新闻用一句话概括核心要点（不超过80字），必须包含原文标题和链接，格式为：[原文标题](链接)\
    \ - 一句话摘要\n4. 选出5-8条最重要的AI产业新闻作为重点关注\n5. 如果新闻较少或没有AI相关新闻，如实说明即可\n6. 输出严格的JSON格式，不要包含其他文字\n\
    \n## 输出JSON格式\n{{\n    \"title\": \"AI产业新闻简报\",\n    \"highlights\": [\"重点新闻1\"\
    , \"重点新闻2\"],\n    \"categories\": [\n        {{\n            \"category\": \"\
    半导体与芯片\",\n            \"items\": [\"[新闻标题](链接) - 一句话摘要\"]\n        }}\n    ]\n\
    }}\n\n以下是新闻列表：\n\n{news_text}"
